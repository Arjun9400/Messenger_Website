<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Send</title>
  <style>
    body { font-family: sans-serif; max-width: 400px; margin: 60px auto; padding: 0 16px; }
    input, textarea, button { width: 100%; box-sizing: border-box; margin-top: 10px; padding: 10px; font-size: 16px; }
    textarea { height: 120px; }
    #status { margin-top: 10px; color: green; }
  </style>
</head>
<body>
<div id="setup" style="display:none">
  <h2>Setup</h2>
  <input id="passInput" type="password" placeholder="Enter passphrase">
  <button onclick="savePass()">Save & Continue</button>
</div>
<div id="main" style="display:none">
  <h2>Send Message</h2>
  <textarea id="msg" placeholder="Type your message..."></textarea>
  <button onclick="sendMsg()">Send</button>
  <button onclick="changePass()" style="background:#aaa;margin-top:5px">Change Passphrase</button>
  <div id="status"></div>
</div>
<script>
const BOT_TOKEN_B = '7767852236:AAFLPyyeIeompZbXqNSsol32B-IW_pVWXxE';
const CHAT_ID_B = '8235125069';

async function getKey(passphrase, salt) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(passphrase), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: 100000, hash: 'SHA-256' },
    keyMaterial, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']
  );
}

async function encrypt(text, passphrase) {
  const enc = new TextEncoder();
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const key = await getKey(passphrase, salt);
  const ciphertext = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, enc.encode(text));
  const buf = new Uint8Array(salt.byteLength + iv.byteLength + ciphertext.byteLength);
  buf.set(salt, 0);
  buf.set(iv, 16);
  buf.set(new Uint8Array(ciphertext), 28);
  return btoa(String.fromCharCode(...buf));
}

function savePass() {
  const p = document.getElementById('passInput').value;
  if (!p) return alert('Enter a passphrase');
  localStorage.setItem('pp', p);
  document.getElementById('setup').style.display = 'none';
  document.getElementById('main').style.display = 'block';
}

function changePass() {
  localStorage.removeItem('pp');
  document.getElementById('main').style.display = 'none';
  document.getElementById('passInput').value = '';
  document.getElementById('setup').style.display = 'block';
}

async function sendMsg() {
  const text = document.getElementById('msg').value.trim();
  if (!text) return;
  const pp = localStorage.getItem('pp');
  const encrypted = await encrypt(text, pp);
  const url = `https://api.telegram.org/bot${BOT_TOKEN_B}/sendMessage`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ chat_id: CHAT_ID_B, text: encrypted })
  });
  if (res.ok) {
    document.getElementById('status').textContent = 'Sent!';
    document.getElementById('msg').value = '';
    setTimeout(() => document.getElementById('status').textContent = '', 2000);
  } else {
    document.getElementById('status').textContent = 'Failed.';
  }
}

if (localStorage.getItem('pp')) {
  document.getElementById('main').style.display = 'block';
} else {
  document.getElementById('setup').style.display = 'block';
}
</script>
</body>
</html>
